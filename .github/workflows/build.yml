name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build plugin
      run: npm run build

    - name: Download Decky Plugin CLI
      run: |
        mkdir -p cli
        curl -L -o cli/decky "https://github.com/SteamDeckHomebrew/cli/releases/latest/download/decky-linux-x86_64"
        chmod +x cli/decky

    - name: Build Decky Plugin
      run: |
        ./cli/decky plugin build .
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DeckTunes-build
        path: out/DeckTunes.zip
