name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build plugin
      run: pnpm run build

    - name: Download yt-dlp binary
      run: |
        mkdir -p bin
        curl -L -o bin/yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp"
        chmod +x bin/yt-dlp

    - name: Package plugin
      run: |
        mkdir -p "DeckTunes"
        cp main.py "./DeckTunes/"
        cp plugin.json "./DeckTunes/"
        cp package.json "./DeckTunes/"
        cp LICENSE "./DeckTunes/"
        cp README.md "./DeckTunes/"
        cp -r dist "./DeckTunes/"
        cp -r bin "./DeckTunes/"
        [ -d "assets" ] && cp -r assets "./DeckTunes/" || true
        [ -d "defaults" ] && cp -r defaults "./DeckTunes/" || true
        mkdir -p out
        zip -r out/DeckTunes.zip DeckTunes
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DeckTunes-build
        path: out/DeckTunes.zip
